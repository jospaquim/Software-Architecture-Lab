apiVersion: v1
kind: Secret
metadata:
  name: eda-secrets
  namespace: default
  labels:
    app: eda-api
type: Opaque
stringData:
  # Redis Connection String (for Read Models)
  redis-connection-string: "redis:6379,password=your-redis-password,ssl=false,abortConnect=false"

  # Event Store Connection String (Kafka-based or dedicated)
  # If using Kafka as event store, this might be same as Kafka connection
  # If using dedicated event store (EventStoreDB), configure accordingly
  eventstore-connection-string: "kafka:9092"

  # JWT Secret Key (IMPORTANT: Change in production!)
  # Generate with: openssl rand -base64 64
  jwt-secret-key: "YourSuperSecretKeyForJwtTokenGenerationChangeThisInProduction123456789"

  # Kafka SASL Credentials (if using authentication)
  kafka-username: "eda-api-user"
  kafka-password: "your-kafka-password"

  # Note: In production, use external secret management solutions like:
  # - Azure Key Vault with CSI driver
  # - AWS Secrets Manager
  # - HashiCorp Vault
  # - Sealed Secrets
