apiVersion: v1
kind: ConfigMap
metadata:
  name: eda-config
  namespace: default
  labels:
    app: eda-api
data:
  # Kafka Configuration
  kafka-bootstrap-servers: "kafka:9092"
  kafka-topic: "order-events"
  kafka-consumer-group: "eda-api-consumer-group"

  # JWT Configuration
  jwt-issuer: "https://eda-api.yourdomain.com"
  jwt-audience: "https://eda-api.yourdomain.com"
  jwt-expiry-minutes: "60"
  jwt-refresh-expiry-days: "7"

  # Rate Limiting Configuration
  rate-limit-window-minutes: "1"
  rate-limit-permit-limit: "100"
  rate-limit-queue-limit: "10"

  # Event Sourcing Configuration
  event-store-retention-days: "365"
  snapshot-interval-events: "100"

  # CORS Configuration
  cors-allowed-origins: "https://yourdomain.com,https://www.yourdomain.com"

  # OpenTelemetry Configuration
  opentelemetry-otlp-endpoint: "http://jaeger:4317"

  # External Services
  notification-service-url: "https://api.notification-service.com"
