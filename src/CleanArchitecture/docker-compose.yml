version: '3.8'

services:
  # Clean Architecture API
  cleanarchitecture-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cleanarchitecture-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CleanArchitectureDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      - ConnectionStrings__Redis=redis:6379
      - DatabaseProvider=SqlServer
      - Jwt__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLong!
      - Jwt__Issuer=CleanArchitectureAPI
      - Jwt__Audience=CleanArchitectureClient
      - Jwt__ExpiryMinutes=60
      - Jwt__RefreshExpiryDays=7
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cleanarch-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cleanarchitecture-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - cleanarch-network
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: cleanarchitecture-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourStrong@Passw0rd
      - POSTGRES_DB=CleanArchitectureDB
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cleanarch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Redis (for caching)
  redis:
    image: redis:7-alpine
    container_name: cleanarchitecture-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cleanarch-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

  # pgAdmin (PostgreSQL Admin UI - Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cleanarchitecture-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - cleanarch-network
    restart: unless-stopped
    profiles:
      - tools

networks:
  cleanarch-network:
    driver: bridge

volumes:
  sqlserver-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
