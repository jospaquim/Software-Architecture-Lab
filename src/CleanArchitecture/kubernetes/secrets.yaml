apiVersion: v1
kind: Secret
metadata:
  name: cleanarchitecture-secrets
  namespace: default
  labels:
    app: cleanarchitecture-api
type: Opaque
stringData:
  # SQL Server Connection String
  connection-string: "Server=sqlserver;Database=CleanArchitectureDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true"

  # PostgreSQL Connection String (alternative)
  # connection-string: "Host=postgres;Database=CleanArchitectureDB;Username=postgres;Password=YourStrong@Passw0rd"

  # Redis Connection String
  redis-connection-string: "redis:6379,password=,ssl=false,abortConnect=false"

  # JWT Secret Key (IMPORTANT: Change in production!)
  # Generate with: openssl rand -base64 64
  jwt-secret-key: "YourSuperSecretKeyForJwtTokenGenerationChangeThisInProduction123456789012345678901234567890"

  # Note: In production, use external secret management solutions like:
  # - Azure Key Vault with CSI driver
  # - AWS Secrets Manager with External Secrets Operator
  # - HashiCorp Vault
  # - Sealed Secrets
