apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: infisical-secret-store
  namespace: default
spec:
  provider:
    webhook:
      url: "https://app.infisical.com/api/v3/secrets/raw"
      method: GET
      headers:
        Authorization:
          secretRef:
            name: infisical-auth
            key: token
      body: ""
      result:
        jsonPath: "$.secrets[*]"
      secrets:
        - name: workspaceId
          secretRef:
            name: infisical-config
            key: workspaceId
        - name: environment
          secretRef:
            name: infisical-config
            key: environment

---
# Credenciales de Infisical (crear manualmente)
apiVersion: v1
kind: Secret
metadata:
  name: infisical-auth
  namespace: default
type: Opaque
stringData:
  # Obtener desde: https://app.infisical.com/settings/tokens
  token: "YOUR_INFISICAL_SERVICE_TOKEN"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infisical-config
  namespace: default
data:
  workspaceId: "YOUR_WORKSPACE_ID"
  environment: "production"
