apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-secret-store
  namespace: default
spec:
  provider:
    vault:
      server: "http://vault.vault-system.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        # Opción 1: Token auth
        tokenSecretRef:
          name: vault-token
          key: token

        # Opción 2: Kubernetes auth (recomendado)
        # kubernetes:
        #   mountPath: "kubernetes"
        #   role: "cleanarchitecture-role"
        #   serviceAccountRef:
        #     name: cleanarchitecture-sa

---
# Vault token (para desarrollo)
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: default
type: Opaque
stringData:
  token: "YOUR_VAULT_TOKEN"

---
# Service Account para Kubernetes auth (producción)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cleanarchitecture-sa
  namespace: default
