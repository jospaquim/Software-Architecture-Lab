apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-keyvault-store
  namespace: default
spec:
  provider:
    azurekv:
      # URL del Key Vault
      vaultUrl: "https://your-keyvault-name.vault.azure.net"

      # Opción 1: Service Principal (Client Credentials)
      authSecretRef:
        clientId:
          name: azure-credentials
          key: clientId
        clientSecret:
          name: azure-credentials
          key: clientSecret
      tenantId: "YOUR_TENANT_ID"

      # Opción 2: Managed Identity (recomendado en Azure)
      # authType: ManagedIdentity
      # identityId: "YOUR_MANAGED_IDENTITY_CLIENT_ID"

---
# Credenciales de Azure (Service Principal)
apiVersion: v1
kind: Secret
metadata:
  name: azure-credentials
  namespace: default
type: Opaque
stringData:
  clientId: "YOUR_AZURE_CLIENT_ID"
  clientSecret: "YOUR_AZURE_CLIENT_SECRET"
