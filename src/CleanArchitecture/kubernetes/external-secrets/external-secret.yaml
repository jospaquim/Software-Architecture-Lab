apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cleanarchitecture-secrets
  namespace: default
spec:
  # Refresh interval
  refreshInterval: 1h

  # Secret store a usar (cambiar según tu provider)
  secretStoreRef:
    name: vault-secret-store  # o infisical-secret-store, azure-keyvault-store
    kind: SecretStore

  # Secret de Kubernetes que se creará
  target:
    name: cleanarchitecture-secrets
    creationPolicy: Owner

  # Mapeo de secrets desde el vault
  data:
    # JWT Secret
    - secretKey: jwt-secret-key
      remoteRef:
        key: application/jwt
        property: secret-key

    # Database Connection String
    - secretKey: connection-string
      remoteRef:
        key: application/database
        property: connection-string

    # Redis Connection String
    - secretKey: redis-connection-string
      remoteRef:
        key: application/redis
        property: connection-string

    # External API Keys
    - secretKey: external-api-key
      remoteRef:
        key: application/external-services
        property: api-key

  # O usar dataFrom para traer todos los secrets de un path
  # dataFrom:
  #   - extract:
  #       key: application

---
# Para Infisical, el formato sería:
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cleanarchitecture-infisical
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical-secret-store
    kind: SecretStore
  target:
    name: cleanarchitecture-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: "*"  # Trae todos los secrets del workspace/environment
