version: '3.8'

services:
  ddd-sales-api:
    build:
      context: ./Sales
      dockerfile: Dockerfile
    container_name: ddd-sales-api
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DatabaseProvider=SqlServer
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=DDD_SalesDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      - ConnectionStrings__Redis=redis:6379
      - Jwt__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLongForDDD!
      - Jwt__Issuer=DDD.Sales.API
      - Jwt__Audience=DDD.Sales.Client
      - Jwt__ExpiryMinutes=60
      - Jwt__RefreshExpiryDays=7
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ddd-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ddd-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    volumes:
      - ddd-sqlserver-data:/var/opt/mssql
    networks:
      - ddd-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ddd-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourStrong@Passw0rd
      - POSTGRES_DB=DDD_SalesDB
    ports:
      - "5433:5432"
    volumes:
      - ddd-postgres-data:/var/lib/postgresql/data
    networks:
      - ddd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    profiles:
      - postgres

  # Redis (for caching and distributed locks)
  redis:
    image: redis:7-alpine
    container_name: ddd-redis
    ports:
      - "6380:6379"
    volumes:
      - ddd-redis-data:/data
    networks:
      - ddd-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  ddd-network:
    driver: bridge

volumes:
  ddd-sqlserver-data:
    driver: local
  ddd-postgres-data:
    driver: local
  ddd-redis-data:
    driver: local
