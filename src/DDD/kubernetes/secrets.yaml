apiVersion: v1
kind: Secret
metadata:
  name: ddd-sales-secrets
  namespace: default
  labels:
    app: ddd-sales-api
type: Opaque
stringData:
  # IMPORTANTE: En producción, NO commitear secrets al repositorio
  # Usar herramientas como:
  # - Azure Key Vault
  # - AWS Secrets Manager
  # - HashiCorp Vault
  # - Sealed Secrets
  # - External Secrets Operator

  connection-string: "Server=sql-server;Database=DDDSalesDB;User Id=sa;Password=CHANGE_ME;TrustServerCertificate=True"
  jwt-secret-key: "CHANGE_ME_super-secret-jwt-key-min-32-chars-long"

  # Redis
  redis-connection-string: "redis:6379"

  # RabbitMQ/MassTransit
  rabbitmq-username: "guest"
  rabbitmq-password: "guest"

# Para crear el secret desde la línea de comandos:
# kubectl create secret generic ddd-sales-secrets \
#   --from-literal=connection-string="Server=..." \
#   --from-literal=jwt-secret-key="..." \
#   --from-literal=redis-connection-string="redis:6379" \
#   --from-literal=rabbitmq-username="guest" \
#   --from-literal=rabbitmq-password="guest" \
#   --namespace=default
