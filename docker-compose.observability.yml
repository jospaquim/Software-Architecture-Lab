version: '3.8'

services:
  # ============================================
  # PROMETHEUS - Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - observability
    restart: unless-stopped

  # ============================================
  # GRAFANA - Metrics Visualization
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - observability
    depends_on:
      - prometheus
    restart: unless-stopped

  # ============================================
  # JAEGER - Distributed Tracing
  # ============================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "5775:5775/udp"  # Zipkin compact thrift
      - "6831:6831/udp"  # Jaeger compact thrift
      - "6832:6832/udp"  # Jaeger binary thrift
      - "5778:5778"      # HTTP serve configs
      - "16686:16686"    # Jaeger UI
      - "14268:14268"    # Jaeger collector HTTP
      - "14250:14250"    # Jaeger collector gRPC
      - "4317:4317"      # OTLP gRPC receiver
      - "4318:4318"      # OTLP HTTP receiver
      - "9411:9411"      # Zipkin compatible endpoint
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - METRICS_STORAGE_TYPE=prometheus
      - PROMETHEUS_SERVER_URL=http://prometheus:9090
      - PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR=true
    networks:
      - observability
    restart: unless-stopped

  # ============================================
  # NODE EXPORTER - System Metrics (Optional)
  # ============================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - observability
    restart: unless-stopped

  # ============================================
  # APPLICATIONS WITH OBSERVABILITY
  # ============================================

  # CleanArchitecture API
  clean-api:
    build:
      context: .
      dockerfile: src/CleanArchitecture/API/Dockerfile
    container_name: clean-api-observable
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CleanArchitectureDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    networks:
      - observability
      - app-network
    depends_on:
      - jaeger
      - prometheus
    restart: unless-stopped
    profiles:
      - clean
      - all

  # DDD Sales API
  ddd-api:
    build:
      context: .
      dockerfile: src/DDD/Sales/API/Dockerfile
    container_name: ddd-api-observable
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=DDDSalesDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    networks:
      - observability
      - app-network
    depends_on:
      - jaeger
      - prometheus
    restart: unless-stopped
    profiles:
      - ddd
      - all

  # EDA API
  eda-api:
    build:
      context: .
      dockerfile: src/EDA/EDA.API/Dockerfile
    container_name: eda-api-observable
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    networks:
      - observability
      - app-network
    depends_on:
      - jaeger
      - prometheus
    restart: unless-stopped
    profiles:
      - eda
      - all

  # ============================================
  # SQL SERVER (Shared Database)
  # ============================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-observable
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - clean
      - ddd
      - all

networks:
  observability:
    driver: bridge
    name: observability-network
  app-network:
    driver: bridge
    name: app-network

volumes:
  prometheus-data:
  grafana-data:
  sqlserver-data:
