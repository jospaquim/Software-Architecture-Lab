version: '3.8'

# Docker Compose con Secrets Management
# Este archivo incluye Infisical y Vault para desarrollo local

services:
  # ==========================================
  # INFISICAL - Self-hosted Secrets Manager
  # ==========================================

  infisical-postgres:
    image: postgres:16-alpine
    container_name: infisical-postgres
    environment:
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: infisical
      POSTGRES_DB: infisical
    volumes:
      - infisical-postgres-data:/var/lib/postgresql/data
    networks:
      - secrets-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical"]
      interval: 10s
      timeout: 5s
      retries: 5

  infisical-redis:
    image: redis:7-alpine
    container_name: infisical-redis
    networks:
      - secrets-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  infisical:
    image: infisical/infisical:latest
    container_name: infisical
    ports:
      - "8080:8080"
    depends_on:
      infisical-postgres:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    environment:
      - DB_CONNECTION_URI=postgres://infisical:infisical@infisical-postgres:5432/infisical
      - REDIS_URL=redis://infisical-redis:6379
      - SITE_URL=http://localhost:8080
      - ENCRYPTION_KEY=your-encryption-key-change-this-in-production
      - AUTH_SECRET=your-auth-secret-change-this-in-production
    networks:
      - secrets-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # HASHICORP VAULT - Development Mode
  # ==========================================

  vault:
    image: hashicorp/vault:latest
    container_name: vault-dev
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    networks:
      - secrets-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: server -dev

  # Init container para poblar Vault con secrets
  vault-init:
    image: hashicorp/vault:latest
    container_name: vault-init
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - secrets-network
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Esperando que Vault esté listo...'
      sleep 5

      echo 'Habilitando KV secrets engine v2...'
      vault secrets enable -version=2 kv || true

      echo 'Creando secrets para Clean Architecture...'
      vault kv put secret/application/jwt \
        secret-key='YourSuperSecretKeyForJwtFromVault123456789012345678901234567890'

      vault kv put secret/application/database \
        connection-string='Server=cleanarch-sqlserver;Database=CleanArchitectureDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True'

      vault kv put secret/application/redis \
        connection-string='cleanarch-redis:6379'

      vault kv put secret/application/external-services \
        api-key='your-external-api-key-here'

      echo 'Secrets creados exitosamente!'
      vault kv list secret/application
      "
    profiles:
      - init

  # ==========================================
  # Clean Architecture API con Vault
  # ==========================================

  cleanarchitecture-api:
    build:
      context: ./src/CleanArchitecture
      dockerfile: Dockerfile
    container_name: cleanarchitecture-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080

      # Configuración del secrets provider
      - SECRETS_PROVIDER=vault  # opciones: infisical, vault, azurekeyvault

      # Vault configuration
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
      - VAULT_SECRET_PATH=application
      - VAULT_MOUNT_POINT=secret

      # Infisical configuration (comentar si usas Vault)
      # - INFISICAL_URL=http://infisical:8080
      # - INFISICAL_CLIENT_ID=your-client-id
      # - INFISICAL_CLIENT_SECRET=your-client-secret
      # - INFISICAL_WORKSPACE_ID=your-workspace-id
      # - INFISICAL_ENVIRONMENT=dev

    depends_on:
      vault:
        condition: service_healthy
      cleanarch-sqlserver:
        condition: service_healthy
      cleanarch-redis:
        condition: service_healthy
    networks:
      - cleanarch-network
      - secrets-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    profiles:
      - clean

  cleanarch-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cleanarch-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    volumes:
      - cleanarch-sqlserver-data:/var/opt/mssql
    networks:
      - cleanarch-network
    profiles:
      - clean
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  cleanarch-redis:
    image: redis:7-alpine
    container_name: cleanarch-redis
    ports:
      - "6379:6379"
    volumes:
      - cleanarch-redis-data:/data
    networks:
      - cleanarch-network
    profiles:
      - clean
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  secrets-network:
    driver: bridge
  cleanarch-network:
    driver: bridge

volumes:
  infisical-postgres-data:
    driver: local
  cleanarch-sqlserver-data:
    driver: local
  cleanarch-redis-data:
    driver: local
