# WARNING: This is for demonstration purposes only!
# In production, use Kubernetes Secrets Manager, Azure Key Vault, AWS Secrets Manager,
# HashiCorp Vault, or Sealed Secrets

apiVersion: v1
kind: Secret
metadata:
  name: cleanarchitecture-secrets
type: Opaque
stringData:
  # Base64 encode these values in production
  connection-string: "Server=sqlserver-service;Database=CleanArchitectureDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true"
  jwt-secret: "YourSuperSecretKeyThatIsAtLeast32CharactersLong!"

# To create secret from command line (recommended):
# kubectl create secret generic cleanarchitecture-secrets \
#   --from-literal=connection-string='Server=...' \
#   --from-literal=jwt-secret='...'
