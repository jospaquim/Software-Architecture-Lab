name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - { name: cleanarchitecture, path: src/CleanArchitecture, port: 5001 }
          - { name: ddd-sales, path: src/DDD/Sales, port: 5100 }
          - { name: eda, path: src/EDA, port: 5200 }

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.path }}
        file: ${{ matrix.service.path }}/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-to-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    strategy:
      matrix:
        service: [ddd, eda]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    - name: Deploy to Kubernetes - ${{ matrix.service }}
      run: |
        cd src/${{ matrix.service }}/kubernetes

        # Update image tags
        export IMAGE_TAG=${{ github.sha }}

        # Apply Kubernetes manifests
        kubectl apply -f configmap.yaml
        kubectl apply -f secrets.yaml
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml
        kubectl apply -f ingress.yaml
        kubectl apply -f hpa.yaml
        kubectl apply -f pdb.yaml

        # Wait for rollout
        kubectl rollout status deployment/${{ matrix.service }}-api -n default --timeout=5m

    - name: Verify deployment
      run: |
        kubectl get pods -n default -l app=${{ matrix.service }}-api
        kubectl get services -n default -l app=${{ matrix.service }}-api

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-to-kubernetes

    steps:
    - name: Run smoke tests
      run: |
        echo "Running smoke tests..."
        # Add your smoke test commands here
        # curl -f https://your-domain.com/health

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-to-kubernetes, smoke-tests]
    if: failure()

    steps:
    - name: Rollback deployment
      run: |
        echo "Rolling back deployment..."
        kubectl rollout undo deployment/ddd-api -n default
        kubectl rollout undo deployment/eda-api -n default
