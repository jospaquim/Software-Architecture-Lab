name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  validate-pr:
    name: Validate Pull Request
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Validate PR title
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          build
          ci
          chore
          revert
        requireScope: false

    - name: Check for breaking changes
      run: |
        echo "Checking for breaking changes..."
        git diff --name-only origin/main...HEAD | grep -E '(Domain|Application)/' && echo "::warning::Domain or Application layer changes detected"

  code-review:
    name: Automated Code Review
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        dotnet restore src/CleanArchitecture/CleanArchitecture.sln
        dotnet restore src/DDD/DDD.sln
        dotnet restore src/EDA/EDA.sln

    - name: Build all solutions
      run: |
        dotnet build src/CleanArchitecture/CleanArchitecture.sln --configuration Release --no-restore
        dotnet build src/DDD/DDD.sln --configuration Release --no-restore
        dotnet build src/EDA/EDA.sln --configuration Release --no-restore

    - name: Run all tests
      run: |
        dotnet test tests/CleanArchitecture.Domain.Tests/CleanArchitecture.Domain.Tests.csproj --no-build --configuration Release
        dotnet test tests/CleanArchitecture.Application.Tests/CleanArchitecture.Application.Tests.csproj --no-build --configuration Release
        dotnet test tests/CleanArchitecture.IntegrationTests/CleanArchitecture.IntegrationTests.csproj --no-build --configuration Release
        dotnet test tests/DDD.Sales.Domain.Tests/DDD.Sales.Domain.Tests.csproj --no-build --configuration Release
        dotnet test tests/DDD.Sales.Application.Tests/DDD.Sales.Application.Tests.csproj --no-build --configuration Release
        dotnet test tests/DDD.Sales.IntegrationTests/DDD.Sales.IntegrationTests.csproj --no-build --configuration Release
        dotnet test tests/EDA.Tests/EDA.Tests.csproj --no-build --configuration Release
        dotnet test tests/EDA.IntegrationTests/EDA.IntegrationTests.csproj --no-build --configuration Release

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install coverage tools
      run: dotnet tool install --global dotnet-coverage

    - name: Run tests with coverage
      run: |
        dotnet test tests/CleanArchitecture.Domain.Tests/CleanArchitecture.Domain.Tests.csproj --collect:"XPlat Code Coverage"
        dotnet test tests/DDD.Sales.Domain.Tests/DDD.Sales.Domain.Tests.csproj --collect:"XPlat Code Coverage"
        dotnet test tests/EDA.Tests/EDA.Tests.csproj --collect:"XPlat Code Coverage"

    - name: Generate coverage report
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool
        reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage -reporttypes:Html

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 30

  architecture-validation:
    name: Architecture Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install ArchUnitNET
      run: dotnet add package TngTech.ArchUnitNET.xUnit

    - name: Validate architecture rules
      run: |
        echo "Validating Clean Architecture rules..."
        echo "- Domain should not depend on Infrastructure"
        echo "- Application should not depend on Infrastructure"
        echo "- Infrastructure can depend on Domain and Application"
        # Add actual architecture tests here

  comment-pr:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [validate-pr, code-review, security-scan, test-coverage]
    if: always()

    steps:
    - name: Create PR comment
      uses: actions/github-script@v7
      with:
        script: |
          const results = {
            validate: '${{ needs.validate-pr.result }}',
            review: '${{ needs.code-review.result }}',
            security: '${{ needs.security-scan.result }}',
            coverage: '${{ needs.test-coverage.result }}'
          };

          const passed = Object.values(results).every(r => r === 'success');
          const emoji = passed ? '✅' : '❌';

          const body = `
          ## ${emoji} PR Checks Results

          | Check | Status |
          |-------|--------|
          | Validation | ${results.validate === 'success' ? '✅' : '❌'} |
          | Code Review | ${results.review === 'success' ? '✅' : '❌'} |
          | Security Scan | ${results.security === 'success' ? '✅' : '❌'} |
          | Test Coverage | ${results.coverage === 'success' ? '✅' : '❌'} |

          ${passed ? '### All checks passed! 🎉' : '### Some checks failed. Please review the results above.'}
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
